<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0e0e0e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="dois cards"/>
<title>dois cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0e0e0e;color:#e8e2d9;font-family:'DM Sans',sans-serif}
#app{min-height:100dvh;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
.screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center}
.serif{font-family:'DM Serif Display',serif}
.logo{font-family:'DM Serif Display',serif;font-size:38px;color:#c8a96e}
.sub{font-size:14px;color:#555;line-height:1.8;margin-top:8px;white-space:pre-line}
.btn{font-size:14px;border-radius:12px;padding:13px 24px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;width:100%;display:block;border:none;margin-bottom:10px;font-weight:400}
.btn-gold{background:#c8a96e;color:#0e0e0e;font-weight:500}
.btn-gold:active{opacity:.8}
.btn-outline{background:none;border:.5px solid #2e2e2e;color:#888}
.btn-outline:active{background:#1a1a1a}
.btn-sm{width:auto;display:inline-block;font-size:13px;padding:8px 16px;border-radius:10px;margin-bottom:0}
.btn-danger{background:none;border:.5px solid #2a1a1a;color:#663333;width:100%;margin-top:8px;font-family:'DM Sans',sans-serif;font-size:14px;padding:13px;border-radius:12px;cursor:pointer}
input[type=text],textarea{width:100%;background:#0a0a0a;border:.5px solid #2a2a2a;border-radius:10px;color:#e8e2d9;font-size:15px;padding:12px 14px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s}
input[type=text]:focus,textarea:focus{border-color:#3a3a3a}
textarea{font-family:'DM Serif Display',serif;font-style:italic;line-height:1.7;resize:none}
.input-group{width:100%;max-width:320px;margin-bottom:12px}
.input-big{text-align:center;letter-spacing:.25em;font-size:24px;text-transform:uppercase}
.app-header{padding:max(20px,env(safe-area-inset-top)) 1.5rem .75rem;display:flex;justify-content:space-between;align-items:flex-start}
.room-badge{font-size:11px;letter-spacing:.08em;color:#666;background:#1a1a1a;border:.5px solid #2e2e2e;border-radius:20px;padding:4px 10px}
.notif-dot{width:7px;height:7px;border-radius:50%;background:#4caf8a;display:inline-block;margin-right:5px;vertical-align:middle}
.tabs{display:flex;padding:0 1.5rem;border-bottom:.5px solid #1e1e1e;margin-bottom:1.5rem;margin-top:10px}
.tab{flex:0 0 auto;font-size:13px;padding:8px 0;margin-right:24px;cursor:pointer;color:#555;background:none;border:none;border-bottom:1.5px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif}
.tab.active{color:#e8e2d9;border-bottom-color:#c8a96e}
.content{flex:1;overflow-y:auto;padding-bottom:max(24px,env(safe-area-inset-bottom))}
.section-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#444;padding:0 1.5rem;margin-bottom:8px;margin-top:16px}
.card{background:#141414;border:.5px solid #252525;border-radius:16px;padding:1.25rem;margin:0 1.5rem 1rem}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.av-a{background:#1e1a2e;color:#9b8fd4}
.av-b{background:#0e1f1a;color:#4caf8a}
.badge{font-size:10px;letter-spacing:.05em;border-radius:20px;padding:3px 10px}
.badge-pending{background:#1e1e1e;color:#444}
.badge-done{background:#0e1f1a;color:#4caf8a}
.badge-rated{background:#1e1a2e;color:#9b8fd4}
.badge-locked{background:#1e1818;color:#c8a96e}
.card-text{font-family:'DM Serif Display',serif;font-style:italic;font-size:15px;line-height:1.75;color:#c8c0b4}
.placeholder{font-size:14px;color:#3a3a3a;font-style:italic;line-height:1.7}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:.5px solid #1e1e1e}
.char-count{font-size:11px;color:#3a3a3a;text-align:right;margin-top:5px}
.stars{display:flex;gap:6px}
.star{font-size:24px;color:#2a2a2a;transition:color .1s;user-select:none;line-height:1;cursor:pointer}
.star.on{color:#c8a96e}
.star-label{font-size:11px;color:#666;margin-top:5px;min-height:16px}
.hist-item{padding:1.25rem 1.5rem;border-bottom:.5px solid #1a1a1a}
.hist-date{font-size:11px;color:#444;margin-bottom:10px;letter-spacing:.04em}
.hist-who{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.hist-text{font-family:'DM Serif Display',serif;font-style:italic;font-size:14px;color:#777;line-height:1.7}
.info-card{background:#141414;border:.5px solid #252525;border-radius:16px;padding:1.5rem;margin:0 1.5rem 1rem}
.info-label{font-size:10px;color:#444;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
.code-big{font-family:'DM Serif Display',serif;font-size:38px;color:#c8a96e;letter-spacing:.12em;margin-bottom:8px}
.member-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.member-row+.member-row{border-top:.5px solid #1e1e1e}
.member-info{display:flex;align-items:center;gap:10px}
.status-dot{width:8px;height:8px;border-radius:50%}
.dot-on{background:#4caf8a}
.dot-off{background:#2a2a2a}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-cell{background:#0e0e0e;border-radius:10px;padding:12px}
.stat-lbl{font-size:11px;color:#444}
.stat-num{font-family:'DM Serif Display',serif;font-size:26px;color:#c8a96e;margin-top:3px}
.empty{padding:3rem 1.5rem;text-align:center;color:#333;font-size:14px;line-height:1.8}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;color:#333;font-size:14px}
.spinner{width:28px;height:28px;border:2px solid #222;border-top-color:#c8a96e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:max(32px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#1e1e1e;border:.5px solid #333;color:#e8e2d9;font-size:13px;padding:10px 20px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.peer-status{font-size:11px;color:#4caf8a;margin-top:5px;min-height:16px}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div>carregando…</div></div>
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase config ──────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAddtdsY3m2lZLWf8Ys5As6TwmFL5XyRSw",
  authDomain: "satowiki-32e72.firebaseapp.com",
  databaseURL: "https://satowiki-32e72-default-rtdb.firebaseio.com",
  projectId: "satowiki-32e72",
  storageBucket: "satowiki-32e72.firebasestorage.app",
  messagingSenderId: "980109388873",
  appId: "1:980109388873:web:d243f988a5a534ed746398"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

// ── local persistence ────────────────────────────────────────────────────────
const KEY_USER = 'dc_user_v4';
const loadUser = () => { try { const v=localStorage.getItem(KEY_USER); return v?JSON.parse(v):null; } catch { return null; } };
const saveUser = v => { try { localStorage.setItem(KEY_USER, JSON.stringify(v)); } catch {} };

// ── helpers ──────────────────────────────────────────────────────────────────
const genCode = () => {
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)]; return s;
};
const todayKey = () => new Date().toISOString().slice(0,10);
const fmtDate  = iso => new Date(iso+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
const STAR_LABELS = ['','honesto','tocante','inspirador','marcante','perfeito'];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── state ────────────────────────────────────────────────────────────────────
let state = {
  user:   loadUser(),
  room:   null,        // live from Firebase
  tab:    'hoje',
  draft:  '',
  joinCode: '',
  screen: '',
  loading: true,
};
let roomListener = null;

function setState(patch) {
  Object.assign(state, typeof patch === 'function' ? patch(state) : patch);
  if ('user' in patch) saveUser(state.user);
  render();
}

// ── Firebase ops ─────────────────────────────────────────────────────────────
function subscribeRoom(code) {
  if (roomListener) { off(ref(db, `rooms/${state.user?.roomCode}`)); roomListener = null; }
  roomListener = onValue(ref(db, `rooms/${code}`), snap => {
    const data = snap.val();
    setState({ room: data, loading: false });
  }, err => {
    console.error(err);
    setState({ loading: false });
  });
}

async function createRoom() {
  setState({ loading: true });
  const code = genCode();
  const room = { code, createdAt: new Date().toISOString(), slots: { a: true, b: false }, entries: {} };
  await set(ref(db, `rooms/${code}`), room);
  const user = { roomCode: code, slot: 'a' };
  saveUser(user);
  state.user = user;
  state.screen = '';
  subscribeRoom(code);
}

async function joinRoom() {
  const code = state.joinCode.trim().toUpperCase();
  if (code.length < 6) { showToast('Código inválido'); return; }
  setState({ loading: true });
  const snap = await get(ref(db, `rooms/${code}`));
  if (!snap.exists()) { setState({ loading: false }); showToast('Sala não encontrada'); return; }
  const room = snap.val();
  if (room.slots?.b) { setState({ loading: false }); showToast('Sala já está cheia'); return; }
  await update(ref(db, `rooms/${code}/slots`), { b: true });
  const user = { roomCode: code, slot: 'b' };
  saveUser(user);
  state.user = user;
  state.joinCode = '';
  state.screen = '';
  subscribeRoom(code);
}

async function publishCard() {
  const text = state.draft.trim();
  if (text.length < 3) return;
  const ms = state.user.slot;
  const today = todayKey();
  const path = `rooms/${state.user.roomCode}/entries/${today}/${ms}`;
  await set(ref(db, path), { text, publishedAt: new Date().toISOString(), rating: null });
  setState({ draft: '' });
  showToast('Card publicado ✓');
}

async function rateCard(stars) {
  const ps = state.user.slot === 'a' ? 'b' : 'a';
  const today = todayKey();
  const path = `rooms/${state.user.roomCode}/entries/${today}/${ps}/rating`;
  await set(ref(db, path), stars);
  showToast(`${STAR_LABELS[stars]} ★`);
}

function leaveRoom() {
  if (!confirm('Sair da sala?')) return;
  if (roomListener) { off(ref(db, `rooms/${state.user.roomCode}`)); roomListener = null; }
  saveUser(null);
  setState({ user: null, room: null, tab: 'hoje', loading: false });
}

// ── DOM helpers ──────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k === 'class') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const child of children.flat()) {
    if (child == null || child === false) continue;
    e.append(typeof child === 'string' || typeof child === 'number'
      ? document.createTextNode(String(child)) : child);
  }
  return e;
}

function makeStars(value, onChange, readOnly) {
  const wrap = el('div',{});
  const row  = el('div',{class:'stars'});
  const lbl  = el('div',{class:'star-label'}, value ? STAR_LABELS[value] : (readOnly ? '' : 'toque para avaliar'));
  for (let n=1; n<=5; n++) {
    const s = el('span',{class:`star${n<=value?' on':''}`},'★');
    if (!readOnly && onChange) {
      s.addEventListener('mouseenter', () => {
        row.querySelectorAll('.star').forEach((st,i)=>st.className='star'+(i<n?' on':''));
        lbl.textContent = STAR_LABELS[n];
      });
      s.addEventListener('mouseleave', () => {
        row.querySelectorAll('.star').forEach((st,i)=>st.className='star'+(i<value?' on':''));
        lbl.textContent = value ? STAR_LABELS[value] : 'toque para avaliar';
      });
      s.addEventListener('click', () => onChange(n));
    }
    row.append(s);
  }
  wrap.append(row, lbl);
  return wrap;
}

// ── render sections ───────────────────────────────────────────────────────────
function renderOnboarding() {
  const { screen, joinCode } = state;
  const wrap = el('div',{class:'screen'});
  if (screen === '') {
    wrap.append(
      el('div',{class:'logo'},'dois cards'),
      el('div',{class:'sub'},'uma sala. dois textos.\ntodo dia.'),
      el('div',{style:{marginTop:'48px',width:'100%',maxWidth:'320px'}},
        el('button',{class:'btn btn-gold',onClick:createRoom},'criar sala'),
        el('button',{class:'btn btn-outline',onClick:()=>setState({screen:'join'})},'entrar com código')
      )
    );
  } else if (screen === 'join') {
    const inp = el('input',{type:'text',class:'input-big',placeholder:'ABC123',maxlength:'6',value:joinCode,autocomplete:'off',autocorrect:'off',autocapitalize:'characters'});
    inp.addEventListener('input', e => { state.joinCode = e.target.value; });
    wrap.append(
      el('div',{class:'serif',style:{fontSize:'26px',color:'#e8e2d9',marginBottom:'8px'}},'entrar na sala'),
      el('div',{class:'sub'},'insira o código da sala'),
      el('div',{style:{marginTop:'32px',width:'100%',maxWidth:'320px'}},
        el('div',{class:'input-group'}, inp),
        el('button',{class:'btn btn-gold',onClick:joinRoom},'entrar'),
        el('button',{class:'btn btn-outline',onClick:()=>setState({screen:''})},'voltar')
      )
    );
    setTimeout(()=>inp.focus(),50);
  }
  return wrap;
}

function renderHoje() {
  const frag = document.createDocumentFragment();
  const r = state.room;
  const ms = state.user.slot;
  const ps = ms === 'a' ? 'b' : 'a';
  const today = todayKey();
  const entry = r?.entries?.[today] || {};
  const mc = entry[ms];
  const pc = entry[ps];
  const pj = r?.slots?.b;
  const mr = pc?.rating || 0;

  // my card
  frag.append(el('div',{class:'section-label'},'seu card'));
  const cardA = el('div',{class:'card'});
  cardA.append(el('div',{class:'card-header'},
    el('div',{class:'avatar av-a'},'eu'),
    el('div',{class:`badge badge-${mc?'done':'pending'}`}, mc?'publicado':'aguardando')
  ));
  if (mc) {
    cardA.append(el('div',{class:'card-text'},`"${mc.text}"`));
  } else {
    const ta = el('textarea',{rows:'4',maxlength:'280',placeholder:'escreva algo para hoje…'});
    ta.value = state.draft;
    const cc = el('div',{class:'char-count'},`${state.draft.length}/280`);
    ta.addEventListener('input', e => { state.draft = e.target.value; cc.textContent = `${e.target.value.length}/280`; });
    cardA.append(ta, cc,
      el('div',{class:'card-footer'},
        el('span',{style:{fontSize:'12px',color:'#333'}},'visível ao parceiro após publicar'),
        el('button',{class:'btn btn-gold btn-sm',onClick:publishCard},'publicar')
      )
    );
  }
  frag.append(cardA);

  // peer card
  frag.append(el('div',{class:'section-label',style:{marginTop:'8px'}},'card do parceiro'));
  const cardB = el('div',{class:'card'});
  const bType = !pj?'locked':pc?(mr?'rated':'done'):'pending';
  const bText = !pj?'sala aberta':pc?(mr?`★ ${mr}`:'publicado'):'aguardando';
  cardB.append(el('div',{class:'card-header'},
    el('div',{class:'avatar av-b'},'p'),
    el('div',{class:`badge badge-${bType}`},bText)
  ));
  if (!pj) {
    cardB.append(
      el('div',{class:'placeholder'},'compartilhe o código '),
      el('strong',{style:{color:'#c8a96e',fontSize:'14px'}}, state.user.roomCode),
      el('div',{class:'placeholder',style:{marginTop:'6px'}},' com seu parceiro para começar.')
    );
  } else if (!pc) {
    cardB.append(el('div',{class:'placeholder'},'seu parceiro ainda não publicou o card de hoje.'));
    if (!mc) cardB.append(el('div',{class:'placeholder',style:{marginTop:'8px',fontSize:'12px',color:'#2a2a2a'}},'(publique o seu primeiro)'));
  } else if (!mc) {
    cardB.append(el('div',{class:'placeholder'},'publique seu card primeiro para ver o do parceiro.'));
  } else {
    cardB.append(el('div',{class:'card-text'},`"${pc.text}"`));
    cardB.append(el('div',{class:'card-footer'}, makeStars(mr, mr?null:rateCard, !!mr)));
  }
  frag.append(cardB);
  return frag;
}

function renderHistorico() {
  const r = state.room;
  const ms = state.user.slot;
  const ps = ms === 'a' ? 'b' : 'a';
  const entries = Object.entries(r?.entries||{})
    .filter(([d])=>d!==todayKey())
    .sort((a,b)=>b[0].localeCompare(a[0]));

  if (!entries.length) return el('div',{class:'empty'},'o histórico aparecerá aqui\nconforme os dias passarem.');
  const frag = document.createDocumentFragment();
  for (const [date, entry] of entries) {
    const mine = entry[ms]; const peer = entry[ps];
    const item = el('div',{class:'hist-item'}, el('div',{class:'hist-date'}, fmtDate(date)));
    if (mine) item.append(el('div',{style:{marginBottom:peer?'12px':'0'}},
      el('div',{class:'hist-who'},'você'),
      el('div',{class:'hist-text'},`"${mine.text}"`)
    ));
    if (peer) item.append(el('div',{},
      el('div',{class:'hist-who'}, peer.rating?`parceiro · ★ ${peer.rating}`:'parceiro'),
      el('div',{class:'hist-text'},`"${peer.text}"`)
    ));
    frag.append(item);
  }
  return frag;
}

function renderSala() {
  const r = state.room;
  const ms = state.user.slot;
  const ps = ms === 'a' ? 'b' : 'a';
  const pj = r?.slots?.b;
  const allE = Object.values(r?.entries||{});
  const totalDays  = Object.keys(r?.entries||{}).length;
  const totalCards = allE.reduce((a,e)=>a+(e.a?1:0)+(e.b?1:0),0);
  const ratings    = allE.map(e=>e[ps]?.rating).filter(Boolean);
  const avg = ratings.length?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):'—';

  const frag = document.createDocumentFragment();
  frag.append(
    el('div',{class:'info-card'},
      el('div',{class:'info-label'},'código da sala'),
      el('div',{class:'code-big'}, state.user.roomCode),
      el('div',{style:{fontSize:'13px',color:'#555',lineHeight:'1.6'}},
        'Compartilhe este código com seu parceiro. A sala comporta apenas duas pessoas.'
      )
    ),
    el('div',{class:'info-card'},
      el('div',{class:'info-label'},'membros'),
      el('div',{class:'member-row'},
        el('div',{class:'member-info'}, el('div',{class:'avatar av-a'},'eu'),
          el('span',{style:{fontSize:'14px',color:'#c8c0b4'}},'você (slot A)')),
        el('div',{class:'status-dot dot-on'})
      ),
      el('div',{class:'member-row'},
        el('div',{class:'member-info'}, el('div',{class:'avatar av-b'},'p'),
          el('span',{style:{fontSize:'14px',color:pj?'#c8c0b4':'#333'}}, pj?'parceiro (slot B)':'aguardando...')),
        el('div',{class:`status-dot ${pj?'dot-on':'dot-off'}`})
      )
    ),
    el('div',{class:'info-card'},
      el('div',{class:'info-label'},'estatísticas'),
      el('div',{class:'stat-grid'},
        ...[['dias registrados',totalDays],['cards publicados',totalCards],['avaliações dadas',ratings.length],['média recebida',avg]].map(([l,v])=>
          el('div',{class:'stat-cell'}, el('div',{class:'stat-lbl'},l), el('div',{class:'stat-num'},String(v)))
        )
      )
    ),
    el('div',{style:{padding:'0 1.5rem 2rem'}},
      el('button',{class:'btn-danger',onClick:leaveRoom},'sair da sala')
    )
  );
  return frag;
}

// ── main render ───────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('app');
  root.innerHTML = '';

  if (state.loading) {
    root.append(el('div',{class:'loading'}, el('div',{class:'spinner'}), 'carregando…'));
    return;
  }

  if (!state.user) { root.append(renderOnboarding()); return; }

  // header
  root.append(el('div',{class:'app-header'},
    el('div',{},
      el('div',{class:'serif',style:{fontSize:'24px',color:'#c8a96e'}},'dois cards'),
      el('div',{style:{fontSize:'12px',color:'#444',marginTop:'3px'}},
        el('span',{class:'notif-dot'}), fmtDate(todayKey())
      )
    ),
    el('div',{style:{textAlign:'right'}},
      el('div',{class:'room-badge'}, state.user.roomCode),
      !state.room?.slots?.b
        ? el('div',{style:{fontSize:'11px',color:'#c8a96e',marginTop:'5px'}},'aguardando parceiro')
        : el('div',{style:{fontSize:'11px',color:'#4caf8a',marginTop:'5px'}},'sala completa ✓')
    )
  ));

  // tabs
  const tabBar = el('div',{class:'tabs'});
  for (const t of ['hoje','histórico','sala']) {
    tabBar.append(el('button',{class:`tab${state.tab===t?' active':''}`,onClick:()=>setState({tab:t})},t));
  }
  root.append(tabBar);

  const content = el('div',{class:'content'});
  if (state.tab==='hoje')           content.append(renderHoje());
  else if (state.tab==='histórico') content.append(renderHistorico());
  else                              content.append(renderSala());
  root.append(content);
}

// ── boot ──────────────────────────────────────────────────────────────────────
if (state.user?.roomCode) {
  subscribeRoom(state.user.roomCode);
} else {
  setState({ loading: false });
}
</script>
</body>
</html>
